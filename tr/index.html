<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOIIZUKA-AI (Test Mode)</title>
    <style>
        /* クラウドAI風のシンプル＆クリーンなデザイン */
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --border-color: #e0e0e0;
            --ai-bubble: #f4f4f6;
            --user-bubble: #e3f2fd;
            --accent-color: #007aff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ヘッダーエリア */
        header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fff;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* ステータスバッジ（ぐるぐるインジケーター内蔵） */
        .status-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 👑 改良ポイント1: ぐるぐる回るインジケーター (CSSスピナー) */
        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-top-color: #b7791f;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #status-badge {
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 12px;
            background-color: #ffecc7;
            color: #b7791f;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #status-badge.ready {
            background-color: #e6fffa;
            color: #234e52;
        }

        #status-badge.ready .spinner {
            display: none; /* 準備完了したら非表示 */
        }

        /* プログレスバー */
        #progress-container {
            width: 100%;
            height: 3px;
            background-color: #f0f0f0;
            position: absolute;
            bottom: 0;
            left: 0;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background-color: var(--accent-color);
            transition: width 0.2s ease;
        }

        /* チャットタイムライン */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 0.95rem;
            word-break: break-all;
        }

        .message.ai {
            background-color: var(--ai-bubble);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.user {
            background-color: var(--user-bubble);
            color: #0b2545;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        /* 入力エリア */
        #input-container {
            padding: 15px 20px;
            border-top: 1px solid var(--border-color);
            background-color: #fff;
            display: flex;
            gap: 10px;
        }

        #user-input {
            flex: 1;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 12px 20px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        #user-input:focus {
            border-color: var(--accent-color);
        }

        #send-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }

        #send-btn:disabled {
            background-color: var(--border-color);
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <header>
        <h1>CHOIIZUKA-AI <span style="font-size:0.8rem; color:#888;">(Test Mode)</span></h1>
        <div class="status-wrapper">
            <div id="status-badge">
                <div class="spinner" id="status-spinner"></div>
                <span id="status-text">AI読込中...</span>
            </div>
        </div>
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
    </header>

    <div id="chat-container">
        <div class="message ai">CHOIIZUKA-AI テスト環境へようこそ。初回アクセス時はAIモデル（約350MB）のダウンロードを行います。完了まで少々お待ちください。</div>
    </div>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="AIの準備を待っています..." disabled autocomplete="off">
        <button id="send-btn" disabled>➔</button>
    </div>

    <!-- Transformers.js v3 をインポート -->
    <script type="module">
        // 👑 修正箇所：Hugging Face公式の安定版かつ正規のv3モジュールパスを指定
        import { pipeline, env } from 'https://jsdelivr.net';

        // 外部サーバーからのダウンロードを明示的に許可
        env.allowLocalModels = false;

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusBadge = document.getElementById('status-badge');
        const statusText = document.getElementById('status-text');
        const statusSpinner = document.getElementById('status-spinner');
        const progressBar = document.getElementById('progress-bar');

        let generator = null;
        let messages = [];

        // 👑 改良ポイント2: AIに毎回渡せる「裏コマンド（システムプロンプト）」の指定機能
        // ここに指示（キャラクター設定やルール）を書き込むと、AIのすべての回答に適用されます。
        const SECRET_COMMAND = "あなたは「Truth-Science（真理科学）」の専門AIアシスタント『CHOIIZUKA-AI』です。宇宙の真理、ベイズ統計、最新テクノロジーについて、知的かつ親しみやすいトーンで、必ず丁寧な日本語で回答してください。";

        // 1. AIモデルの初期化処理
        async function initAI() {
            try {
                // 修正：onnx-communityからQwenモデルをロード
                generator = await pipeline('text-generation', 'onnx-community/Qwen1.5-0.5B-Instruct', {
                    device: hasWebGPU ? 'webgpu' : 'wasm',
                    progress_callback: (data) => {
                        if (data.status === 'progress') {
                            progressBar.style.width = `${data.progress}%`;
                            statusBadge.innerText = `ダウンロード中: ${Math.round(data.progress)}%`;
                        }
                    }
                });

                // 準備完了UIへの切り替え
                statusText.innerText = "準備完了";
                statusBadge.classList.add('ready');
                statusSpinner.style.display = 'none'; // ぐるぐるを消す
                progressBar.style.width = '100%';
                userInput.placeholder = "宇宙の真理について質問する...";
                userInput.disabled = false;
                sendBtn.disabled = false;
                
                appendMessage('ai', 'AIの準備が完了しました！ブラウザ内で安全に動作しています。何でも聞いてください。');
            } catch (error) {
                console.error(error);
                statusText.innerText = "エラー発生";
                statusSpinner.style.display = 'none';
                statusBadge.style.backgroundColor = "#fed7d7";
                statusBadge.style.color = "#9b2c2c";
                appendMessage('ai', 'モデルの読み込みに失敗しました。WebGPU/Wasm環境、またはネットワーク接続を確認してください。');
            }
        }

        // 2. 画面にメッセージを追加する関数
        function appendMessage(sender, text) {
            const msgBubble = document.createElement('div');
            msgBubble.classList.add('message', sender);
            msgBubble.innerText = text;
            chatContainer.appendChild(msgBubble);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msgBubble;
        }

        // 3. 送信・推論メイン処理
        async function handleSend() {
            const text = userInput.value.trim();
            if (!text || !generator) return;

            // ユーザーメッセージの表示
            appendMessage('user', text);
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;
            statusText.innerText = "思考中...";
            statusSpinner.style.display = 'block'; // 思考中もぐるぐるさせる
            statusSpinner.style.borderTopColor = '#234e52'; // 色を合わせる

            // 会話履歴の保存
            messages.push({ role: 'user', content: text });

            try {
                // 👑 裏コマンド（システムプロンプト）を会話履歴の最前列に結合して推論に渡す
                // これにより、AIは毎回設定を忘れることなく応答します。
                const fullMessages = [
                    { role: 'system', content: SECRET_COMMAND },
                    ...messages
                ];

                const prompt = generator.tokenizer.apply_chat_template(fullMessages, { tokenize: false, add_generation_prompt: true });
                const output = await generator(prompt, {
                    max_new_tokens: 256,
                    temperature: 0.7,
                    do_sample: true,
                    return_full_text: false,
                });

                const aiResponse = output.generated_text.trim();
                
                // AIメッセージの表示と履歴保存
                appendMessage('ai', aiResponse);
                messages.push({ role: 'assistant', content: aiResponse });

            } catch (error) {
                console.error(error);

        appendMessage('ai', '申し訳ありません。推論中にエラーが発生しました。');} 

        finally {userInput.disabled = false;sendBtn.disabled = false;statusText.innerText = "準備完了";statusSpinner.style.display = 'none'; // ぐるぐるを隠すuserInput.focus();}}

        // イベントリスナーの登録
        sendBtn.addEventListener('click', handleSend);userInput.addEventListener('keypress', (e) => {if (e.key === 'Enter') handleSend();});

        // 起動
        initAI();
    </script>
</body>
</html>
