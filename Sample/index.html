<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MINIMUM TEST</title>
</head>
<body>
    <h1>AI起動テスト（CORS・タイムアウト回避版）</h1>
    <div id="output" style="font-family: monospace; padding: 20px; background: #f4f4f6;">起動中...</div>

    <script type="module">
        // 👑 解決策：タイムアウトするjsdelivrを完全に排除し、安全な正規の直リンクに変更
        import { pipeline } from 'https://unpkg.com';

        async function test() {
            const out = document.getElementById('output');
            try {
                out.innerText = "通信開始（モデル取得中）...";

                // 超軽量モデル（約40MB）で通信テスト
                const classifier = await pipeline('sentiment-analysis', 'Xenova/distilbert-base-uncased-finetuned-sst-2-english', { 
                    device: 'wasm' 
                });
                
                out.innerText = "推論中...";
                const result = await classifier('Hello AI!');
                out.innerText = JSON.stringify(result);

            } catch (e) {
                out.innerText = 'エラーの事実: ' + e.message;
            }
        }
        test();
    </script>
</body>
</html>
