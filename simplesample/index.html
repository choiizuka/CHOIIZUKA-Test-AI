<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>CHOIIZUKA-AI (Test Mode)</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #fff; color: #333; }
        #progress-container { width: 100%; height: 4px; background: #f0f0f0; margin: 10px 0; }
        #progress-bar { width: 0%; height: 100%; background: #007aff; transition: width 0.1s; }
        #output { padding: 15px; background: #f4f4f6; border-radius: 8px; font-family: monospace; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>CHOIIZUKA-AI</h1>
    <div id="status">システム起動中...</div>
    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="output">初期化を待っています...</div>

    <script>
// main.js - UI制御とWorkerの仲介オブジェクト
(function() {
    const statusDiv = document.getElementById('status');
    const progressBar = document.getElementById('progress-bar');
    const outputDiv = document.getElementById('output');

    // 設計書通り、完全ローカル配置されたClassic Workerを生成
    //const aiWorker = new Worker('worker.js');
    const worker = new Worker('worker.js', { type: 'module' });
    
    aiWorker.onmessage = function(e) {
        const { type, data } = e.data;

        if (type === 'progress') {
            progressBar.style.width = `${data}%`;
            statusDiv.innerText = `モデル取得中: ${data}%`;
        } else if (type === 'ready') {
            statusDiv.innerText = `準備完了`;
            progressBar.style.width = '100%';
            outputDiv.innerText = 'AIエンジンの初期化が完了しました。推論を実行します...';
        } else if (type === 'response') {
            statusDiv.innerText = `推論成功`;
            outputDiv.innerText = JSON.stringify(data, null, 2);
        } else if (type === 'error') {
            statusDiv.innerText = `エラー発生`;
            outputDiv.innerText = `詳細: ${data}`;
        }
    };
})();
    </script>
    <!-- <script src="main.js"></script> -->
</body>
</html>
