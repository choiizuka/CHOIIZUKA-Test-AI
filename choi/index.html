<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOIIZUKA-AI (Test Mode)</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --border-color: #e0e0e0;
            --ai-bubble: #f4f4f6;
            --user-bubble: #e3f2fd;
            --accent-color: #007aff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fff;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .status-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #status-badge {
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 12px;
            background-color: #ffecc7;
            color: #b7791f;
            font-weight: bold;
        }

        #status-badge.ready {
            background-color: #e6fffa;
            color: #234e52;
        }

        #status-badge.error {
            background-color: #fed7d7;
            color: #9b2c2c;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #e0e0e0;
            border-top: 2px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        #progress-container {
            width: 100%;
            height: 3px;
            background-color: #f0f0f0;
            position: absolute;
            bottom: 0;
            left: 0;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background-color: var(--accent-color);
            transition: width 0.1s linear;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 0.95rem;
            word-break: break-all;
        }

        .message.ai {
            background-color: var(--ai-bubble);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.user {
            background-color: var(--user-bubble);
            color: #0b2545;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        #input-container {
            padding: 15px 20px;
            border-top: 1px solid var(--border-color);
            background-color: #fff;
            display: flex;
            gap: 10px;
        }

        #user-input {
            flex: 1;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 12px 20px;
            font-size: 1rem;
            outline: none;
        }

        #send-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #send-btn:disabled {
            background-color: var(--border-color);
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <header>
        <h1>CHOIIZUKA-AI <span style="font-size:0.8rem; color:#888;">(Test Mode)</span></h1>
        <div class="status-container">
            <div id="loading-spinner" class="spinner"></div>
            <div id="status-badge">初期化中...</div>
        </div>
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
    </header>

    <div id="chat-container">
        <div class="message ai">CHOIIZUKA-AI テスト環境へようこそ。初回のみサーバーからモデルファイルを読み込みます（約370MB）。</div>
    </div>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="AIの準備を待っています..." disabled autocomplete="off">
        <button id="send-btn" disabled>➔</button>
    </div>

    <!-- メメイン制御スクリプトの読み込み -->
    <script src="./main.js" type="module"></script>
</body>
</html>
