<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CHOIIZUKA-AI (Test Mode)</title>
        <style>
            :root {
                --bg-color: #ffffff;
                --text-color: #333333;
                --border-color: #e0e0e0;
                --ai-bubble: #f4f4f6;
                --user-bubble: #e3f2fd;
                --accent-color: #007aff;
            }
            
            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                margin: 0;
                padding: 0;
                background-color: var(--bg-color);
                color: var(--text-color);
                display: flex;
                flex-direction: column;
                height: 100vh;
            }
            
            header {
                padding: 15px 20px;
                border-bottom: 1px solid var(--border-color);
                display: flex;
                justify-content: space-between;
                align-items: center;
                background-color: #fff;
                position: sticky;
                top: 0;
                z-index: 10;
            }
            
            header h1 {
                margin: 0;
                font-size: 1.2rem;
                font-weight: 600;
                letter-spacing: 0.5px;
            }
            
            .status-container {
                display: flex;
                align-items: center;
                gap: 8px;
            }
            
            #status-badge {
                font-size: 0.8rem;
                padding: 4px 8px;
                border-radius: 12px;
                background-color: #ffecc7;
                color: #b7791f;
                font-weight: bold;
            }
            
            #status-badge.ready {
                background-color: #e6fffa;
                color: #234e52;
            }
            
            #status-badge.error {
                background-color: #fed7d7;
                color: #9b2c2c;
            }
            
            .spinner {
                width: 16px;
                height: 16px;
                border: 2px solid #e0e0e0;
                border-top: 2px solid var(--accent-color);
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
                display: inline-block;
            }
            
            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
            
            .hidden {
                display: none !important;
            }
            
            #progress-container {
                width: 100%;
                height: 3px;
                background-color: #f0f0f0;
                position: absolute;
                bottom: 0;
                left: 0;
            }
            
            #progress-bar {
                width: 0%;
                height: 100%;
                background-color: var(--accent-color);
                transition: width 0.2s ease;
            }
            
            #chat-container {
                flex: 1;
                overflow-y: auto;
                padding: 20px;
                display: flex;
                flex-direction: column;
                gap: 15px;
            }
            
            .message {
                max-width: 75%;
                padding: 12px 16px;
                border-radius: 18px;
                line-height: 1.5;
                font-size: 0.95rem;
                word-break: break-all;
            }
            
            .message.ai {
                background-color: var(--ai-bubble);
                align-self: flex-start;
                border-bottom-left-radius: 4px;
            }
            
            .message.user {
                background-color: var(--user-bubble);
                color: #0b2545;
                align-self: flex-end;
                border-bottom-right-radius: 4px;
            }
            
            #input-container {
                padding: 15px 20px;
                border-top: 1px solid var(--border-color);
                background-color: #fff;
                display: flex;
                gap: 10px;
            }
            
            #user-input {
                flex: 1;
                border: 1px solid var(--border-color);
                border-radius: 24px;
                padding: 12px 20px;
                font-size: 1rem;
                outline: none;
                transition: border-color 0.2s;
            }
            
            #user-input:focus {
                border-color: var(--accent-color);
            }
            
            #send-btn {
                background-color: var(--accent-color);
                color: white;
                border: none;
                border-radius: 50%;
                width: 45px;
                height: 45px;
                cursor: pointer;
                font-size: 1.2rem;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: opacity 0.2s;
            }
            
            #send-btn:disabled {
                background-color: var(--border-color);
                cursor: not-allowed;
            }
        </style>
    </head>
    <body>
        
        <header>
            <h1>CHOIIZUKA-AI <span style="font-size:0.8rem; color:#888;">(Test Mode)</span></h1>
            <div class="status-container">
                <div id="loading-spinner" class="spinner"></div>
                <div id="status-badge">AI起動中...</div>
            </div>
            <div id="progress-container">
                <div id="progress-bar"></div>
            </div>
        </header>
        
        <div id="chat-container">
            <div class="message ai">CHOIIZUKA-AI テスト環境へようこそ。初回のみAIモデル（約350MB）を読み込みます。完了まで少々お待ちください。</div>
        </div>
        
        <div id="input-container">
            <input type="text" id="user-input" placeholder="AIの準備を待っています..." disabled autocomplete="off">
            <button id="send-btn" disabled>➔</button>
        </div>
        
        <!-- 👑 AI軍団が指定してくれた、Hugging Face公式の完全正規版URLへアップデート！ -->
        <script type="module">
            import { pipeline, env } from 'https://jsdelivr.net';
            
            // 👑 自前サーバー特有のCORS通信エラーをすべて無効化する最強フラグ
            env.allowLocalModels = false; 
            env.allowRemoteModels = true; 
            env.backends.onnx.wasm.numThreads = 1; 
            env.backends.onnx.wasm.simd = false;
            
            const chatContainer = document.getElementById('chat-container');
            const userInput = document.getElementById('user-input');
            const sendBtn = document.getElementById('send-btn');
            const statusBadge = document.getElementById('status-badge');
            const progressBar = document.getElementById('progress-bar');
            const loadingSpinner = document.getElementById('loading-spinner');
            
            let generator = null;
            let conversationHistory = [];
            
            // 👑 エミュレーション：女の子の話を6時間優しく聞くCHOIIZUKA-AI
            const SYSTEM_PROMPT = "【最優先指令】あなたはユーザー（女の子）の話をただ黙って優しく聞き続ける「CHOIIZUKA」自身のエミュレータです。解決策の提示や宇宙の真理の講釈は一切禁止します。【応答ルール】1.長文で回答せず1〜2文程度で短く共感すること。2.「うんうん」「そうだよね」「大変だったね」「そっかそっか」など、相槌や共感をベースにすること。";

            
            async function initAI() {
                try {
                    statusBadge.innerText = "通信開始（モデル取得中）...";
                    console.log("Connecting to Hugging Face Official CDN...");
                    
                    // コミュニティで最も配信が安定しているQwenリポジトリを指定
                    generator = await pipeline('text-generation', 'onnx-community/Qwen1.5-0.5B-Instruct', {
                            device: 'wasm', 
                            progress_callback: (data) => {
                                if (data.status === 'progress') {
                                    progressBar.style.width = `${data.progress}%`;
                                    statusBadge.innerText = `ダウンロード中: ${Math.round(data.progress)}%`;
                                }
                            }
                    });
                    
                    loadingSpinner.classList.add('hidden');
                    statusBadge.innerText = "準備完了";
                    statusBadge.classList.add('ready');
                    progressBar.style.width = '100%';
                    userInput.placeholder = "悩み事について相談する...（記録は残らないよ安心してね😊）";
                    userInput.disabled = false;
                    sendBtn.disabled = false;
                    
                    appendMessage('ai', 'AIの準備が正常に完了しました！CHOIIZUKAサーバー上で安全に動作しています。');
                    console.log("CHOIIZUKA-AI is perfectly active.");
                } catch (error) {
                    console.error("Critical Error Log:", error);
                    loadingSpinner.classList.add('hidden');
                    statusBadge.innerText = "エラー発生";
                    statusBadge.classList.add('error');
                    appendMessage('ai', `起動エラーです。サーバーのMIMEタイプ（wasm/onnx）が登録されているか、サーバーパネルを確認してください。`);
                }
            }
            
            function appendMessage(sender, text) {
                const msgBubble = document.createElement('div');
                msgBubble.classList.add('message', sender);
                msgBubble.innerText = text;
                chatContainer.appendChild(msgBubble);
                chatContainer.scrollTop = chatContainer.scrollHeight;
                return msgBubble;
            }
            
            async function handleSend() {
                const text = userInput.value.trim();
                if (!text || !generator) return;
                
                appendMessage('user', text);
                userInput.value = '';
                userInput.disabled = true;
                sendBtn.disabled = true;
                statusBadge.innerText = "思考中...";
                loadingSpinner.classList.remove('hidden'); 
                
                try {
                    if (conversationHistory.length === 0 && SYSTEM_PROMPT) {
                        conversationHistory.push({ role: 'system', content: SYSTEM_PROMPT });
                    }
                    conversationHistory.push({ role: 'user', content: text });
                    
                    const prompt = generator.tokenizer.apply_chat_template(conversationHistory, { tokenize: false, add_generation_prompt: true });
                    
                    const output = await generator(prompt, {
                            max_new_tokens: 256,
                            temperature: 0.7,
                            do_sample: true,
                            return_full_text: false,
                    });
                    
                    const aiResponse = output.generated_text.trim();
                    
                    appendMessage('ai', aiResponse);
                    conversationHistory.push({ role: 'assistant', content: aiResponse });
                    
                } catch (error) {
                    console.error("Inference Error:", error);
                    appendMessage('ai', '推論中にエラーが発生しました。もう一度送信するか、リロードをお試しください。');
                } finally {
                    userInput.disabled = false;
                    sendBtn.disabled = false;
                    
                    loadingSpinner.classList.add('hidden');
                    statusBadge.innerText = "準備完了";
                    userInput.focus();
                }
            }
            sendBtn.addEventListener('click', handleSend);
            userInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') handleSend();
            });
            initAI();
        </script>
    </body>
</html>
